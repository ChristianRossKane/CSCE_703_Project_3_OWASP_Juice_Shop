<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christian Kane's CSCE 703 Juice Shop Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-card">
    <h1 class="brand">🧃 Christian Kane's CSCE 703 <span>Juice Shop Login</span></h1>

    <form id="login-form" novalidate>
      <label for="email">Email</label>
      <input type="text" id="email" name="email" autocomplete="username" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="At least 8 characters" />

      <div id="error-message" class="error" role="alert" aria-live="polite"></div>

      <button type="submit">Log in</button>
    </form>

    <p class="hint">Test account: <code>test@juice-shop-form.com</code> / <code>SecurePass123</code></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
